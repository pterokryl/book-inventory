<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}Учет книг{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text: #1a1f2b;
            --muted: #667085;
            --border: #e4e7ec;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            color: var(--text);
            background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 180px);
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 40px; }

        .page-head, .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .eyebrow { margin: 0 0 6px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .page-title, .header h1 { margin: 0; font-size: clamp(1.5rem, 2vw, 2rem); line-height: 1.2; }
        .page-subtitle { margin: 8px 0 0; color: var(--muted); max-width: 56ch; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid transparent;
            text-decoration: none;
            color: var(--text);
            background: var(--surface);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-secondary { background: var(--surface); border-color: var(--border); }
        .btn-secondary:hover { background: #f9fafb; }
        .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); }
        .btn-ghost:hover { background: #f2f4f7; color: var(--text); }
        .btn-sm { padding: 7px 10px; font-size: 13px; border-radius: 8px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
        }
        .stat-label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 4px; }
        .stat-value { font-size: 1.6rem; line-height: 1; }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .search-field {
            position: relative;
            flex: 1 1 260px;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }
        .search-field .filter-input { padding-left: 34px; width: 100%; }

        .location-tree { display: grid; gap: 12px; }
        .loc-room {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .loc-room-summary {
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            cursor: pointer;
            background: #fafbff;
        }
        .loc-room-summary::-webkit-details-marker { display: none; }
        .loc-room[open] .loc-room-summary { border-bottom: 1px solid var(--border); }
        .loc-room-main, .loc-cabinet-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .loc-icon { font-size: 1.4rem; line-height: 1; }
        .loc-icon-sm { font-size: 1.1rem; }
        .loc-title { margin: 0; font-size: 1.1rem; }
        .loc-subtitle { margin: 0; font-size: 1rem; }
        .loc-meta { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
        .loc-summary-actions, .loc-cabinet-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .loc-room-body { padding: 14px; display: grid; gap: 12px; }
        .loc-cabinet {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            background: #fcfcfd;
        }
        .loc-cabinet-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #eef2ff;
            color: #1e3a8a;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #dbe4ff;
        }
        .chip:hover { background: #e0e7ff; }
        .chip-action { opacity: 0.7; font-size: 12px; }

        .empty-state, .empty-panel, .empty-inline {
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 24px;
        }
        .empty-state-icon { font-size: 2.4rem; margin-bottom: 8px; }
        .empty-panel {
            padding: 16px;
            border-radius: 10px;
            background: #f9fafb;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-empty { text-align: center; color: var(--muted); margin-top: 12px; }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            max-width: 560px;
        }
        .form-card-wide { max-width: none; }
        .form-stack { display: grid; gap: 14px; }
        .form-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
        .field-help { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
        .link-muted { color: var(--muted); text-decoration: none; }
        .link-muted:hover { color: var(--primary); }

        .filters-panel { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; background: var(--surface); box-shadow: var(--shadow); }
        .filters-summary { cursor: pointer; font-weight: 700; margin-bottom: 10px; }
        .filters { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 10px; }
        .filter-field, .form-field { display: flex; flex-direction: column; gap: 4px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 12px; margin-bottom: 14px; }
        .form-field-full { grid-column: 1 / -1; }
        .filter-label { font-size: 13px; font-weight: 700; color: #333; }
        .filter-input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }
        .filter-input:focus {
            outline: none;
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .errorlist { margin: 4px 0 0; color: #b00020; list-style: none; padding: 0; }
        .filters-actions { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
        .table { width: 100%; border-collapse: collapse; min-width: 760px; }
        .table th, .table td { border-bottom: 1px solid var(--border); padding: 10px 12px; vertical-align: top; }
        .table th { background: #f9fafb; text-align: left; font-size: 13px; color: var(--muted); }
        .table tr:last-child td { border-bottom: none; }
        .actions { white-space: nowrap; }
        .pagination { margin-top: 16px; display: flex; gap: 8px; align-items: center; }
        img.thumb { max-height: 80px; cursor: pointer; border-radius: 8px; }
        img.thumb:hover { opacity: 0.85; }
        .photo-lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.85);
        }
        .photo-lightbox[hidden] { display: none; }
        .photo-lightbox-image {
            max-width: min(95vw, 1200px);
            max-height: 90vh;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .photo-lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 36px;
            line-height: 1;
            cursor: pointer;
            padding: 4px 10px;
        }
        .muted { color: var(--muted); }
        .hint { margin: 0 0 12px; color: var(--muted); }

        @media (max-width: 768px) {
            .container { padding: 16px 12px 32px; }
            .page-head, .header { flex-direction: column; align-items: stretch; }
            .header-actions, .loc-summary-actions, .loc-cabinet-actions, .form-actions { width: 100%; }
            .header-actions .btn, .loc-summary-actions .btn, .loc-cabinet-actions .btn, .form-actions .btn { flex: 1; }
            .stats-grid { grid-template-columns: 1fr; }
            .filters { grid-template-columns: 1fr; }
            .filters-actions { flex-direction: column; align-items: stretch; }
            .form-grid { grid-template-columns: 1fr; }
            .pagination { flex-wrap: wrap; }
            .loc-room-summary { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
