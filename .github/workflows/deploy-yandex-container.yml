name: Deploy to Yandex Serverless Container

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: book-inventory
  CONTAINER_NAME: book-inventory
  FOLDER_ID: b1g0aqk09fto5n221cos
  SERVICE_ACCOUNT_ID: ajekqm793gd4vc8jqa3q

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /home/runner/yandex-cloud -n
          echo "/home/runner/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud auth
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
        run: |
          test -n "$YC_SERVICE_ACCOUNT_KEY_JSON"
          test -n "$YC_CLOUD_ID"
          echo "$YC_SERVICE_ACCOUNT_KEY_JSON" > key.raw.json
          jq '{id, service_account_id, private_key, key_algorithm, public_key}' key.raw.json > key.json
          test "$(jq -r '.id // empty' key.json)" != ""
          test "$(jq -r '.service_account_id // empty' key.json)" != ""
          test "$(jq -r '.private_key // empty' key.json)" != ""
          yc config profile create ci
          yc config set service-account-key key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$FOLDER_ID"

      - name: Verify Container Registry
        env:
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          if [ -z "$YC_REGISTRY_ID" ]; then
            echo "Secret YC_REGISTRY_ID is not set."
            echo "Create one in GitHub Secrets with ID from:"
            echo "  yc container registry list --folder-id $FOLDER_ID"
            exit 1
          fi
          if ! yc container registry get "$YC_REGISTRY_ID" --folder-id "$FOLDER_ID" >/dev/null 2>&1; then
            echo "Registry '$YC_REGISTRY_ID' not found in folder $FOLDER_ID"
            echo "Available registries:"
            yc container registry list --folder-id "$FOLDER_ID"
            exit 1
          fi
          echo "REGISTRY_ID=$YC_REGISTRY_ID" >> "$GITHUB_ENV"

      - name: Configure Docker for Yandex Container Registry
        run: yc container registry configure-docker

      - name: Build and push image
        run: |
          IMAGE="cr.yandex/$REGISTRY_ID/$IMAGE_NAME:${GITHUB_SHA}"
          IMAGE_LATEST="cr.yandex/$REGISTRY_ID/$IMAGE_NAME:latest"
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy new revision
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          DJANGO_CSRF_TRUSTED_ORIGINS: ${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DJANGO_SECRET_KEY"
          test -n "$DJANGO_ALLOWED_HOSTS"
          test -n "$DJANGO_CSRF_TRUSTED_ORIGINS"
          yc serverless container revision deploy \
            --container-name "$CONTAINER_NAME" \
            --folder-id "$FOLDER_ID" \
            --image "$IMAGE" \
            --cores 1 \
            --memory 1024MB \
            --concurrency 4 \
            --execution-timeout 120s \
            --service-account-id "$SERVICE_ACCOUNT_ID" \
            --environment DJANGO_DEBUG=False \
            --environment DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            --environment DJANGO_ALLOWED_HOSTS="$DJANGO_ALLOWED_HOSTS" \
            --environment DJANGO_CSRF_TRUSTED_ORIGINS="$DJANGO_CSRF_TRUSTED_ORIGINS" \
            --environment DJANGO_SECURE_SSL_REDIRECT=False \
            --environment DJANGO_SQLITE_PATH=/tmp/db.sqlite3 \
            --environment DJANGO_MEDIA_ROOT=/tmp/media \
            --environment DJANGO_SERVE_MEDIA=True \
            --environment DATABASE_URL="$DATABASE_URL"
